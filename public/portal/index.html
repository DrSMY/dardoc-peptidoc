<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>My Portal — DarDoc · PeptiDoc</title>
<link rel="stylesheet" href="/theme.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2355682B'/><path d='M50 78c-16 0-28-12-28-28 0-10 5-18 13-23 3 8 8 13 16 16 8 3 15 8 18 16a26 26 0 0 1-19 19Z' fill='none' stroke='%23E9C766' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/><path d='M30 70c3-8 9-13 16-16' fill='none' stroke='%23E9C766' stroke-width='6' stroke-linecap='round'/></svg>">
<style>
  body { background: var(--bg); }
  .p-app { max-width: 560px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
  .p-top {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 14px 18px calc(14px);
    background: linear-gradient(120deg, var(--brand), var(--primary)); color: #fff;
    border-radius: 0 0 22px 22px;
  }
  .p-top .brand-line { display: flex; align-items: center; gap: 10px; }
  .p-top .brand-mark { width: 38px; height: 38px; border-radius: 11px; background: rgba(255,255,255,.15); display: flex; align-items: center; justify-content: center; }
  .p-top .t-name { font-family: var(--font-head); font-weight: 800; font-size: 15px; line-height: 1.15; }
  .p-top .t-sub { font-size: 11.5px; opacity: .75; }
  .p-top .icon-btn { color: #fff; }
  .p-top .icon-btn:hover { background: rgba(255,255,255,.12); }

  .p-view { flex: 1; padding: 18px 16px calc(86px + env(safe-area-inset-bottom)); }

  .p-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: min(560px, 100%); z-index: 100;
    display: flex; background: var(--surface);
    border-top: 1px solid var(--border); box-shadow: 0 -4px 20px rgba(20,49,47,.07);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .p-nav button {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 10px 4px 9px; background: none; border: none; color: var(--faint);
    font-size: 10.5px; font-weight: 700; font-family: var(--font-head); letter-spacing: .02em;
    min-height: 56px;
  }
  .p-nav button.on { color: var(--brand); }
  .p-nav .nav-log {
    margin-top: -22px;
  }
  .p-nav .nav-log .log-fab {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--brand); color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 16px rgba(30,76,78,.4);
    transition: transform .15s var(--ease);
  }
  .p-nav .nav-log:active .log-fab { transform: scale(.93); }

  .hello { margin: 6px 2px 16px; }
  .hello h1 { font-size: 22px; }
  .hello .sub { color: var(--muted); font-size: 13.5px; }

  .phase-card { border-radius: var(--r-lg); padding: 20px; color: #fff; margin-bottom: 16px; box-shadow: var(--shadow-md); }
  .phase-lbl { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; opacity: .85; }
  .phase-name { font-family: var(--font-head); font-size: 24px; font-weight: 800; margin: 4px 0 6px; }
  .phase-desc { font-size: 13.5px; opacity: .92; line-height: 1.5; }
  .phase-track { display: flex; gap: 4px; margin-top: 14px; }
  .phase-seg { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,.25); }
  .phase-seg.done { background: rgba(255,255,255,.9); }
  .phase-meta { display: flex; justify-content: space-between; font-size: 11.5px; opacity: .85; margin-top: 6px; }

  .qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .qa {
    display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 16px; text-align: left; box-shadow: var(--shadow-sm);
    transition: transform .13s var(--ease), box-shadow .15s var(--ease);
  }
  .qa:active { transform: scale(.97); }
  .qa-ico { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .qa b { font-family: var(--font-head); font-size: 14.5px; }
  .qa span { font-size: 12px; color: var(--muted); }

  .list-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); margin-bottom: 16px; }
  .list-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px 0; }
  .list-head h3 { font-size: 15px; display: flex; gap: 8px; align-items: center; }
  .list-head h3 svg { color: var(--brand); }

  .site-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .msg-list { display: flex; flex-direction: column; gap: 10px; padding: 4px 2px; }
  .msg { max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: 14.5px; }
  .msg.patient { align-self: flex-end; background: var(--brand); color: #fff; border-bottom-right-radius: 4px; }
  .msg.doctor { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-time { font-size: 10.5px; opacity: .65; margin-top: 3px; }
  .msg-bar { position: fixed; bottom: calc(64px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: min(560px, 100%); padding: 10px 14px; background: var(--bg); display: flex; gap: 8px; }

  .sym-block { margin-bottom: 14px; }
  .sym-lbl { font-size: 12.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 7px; }
  .sym-opts { display: flex; gap: 7px; flex-wrap: wrap; }

  .login-hero { text-align: center; padding: 46px 20px 26px; }
  .login-hero .brand-mark { width: 62px; height: 62px; border-radius: 18px; background: var(--brand); color: #fff; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .login-hero h1 { font-size: 23px; }
  .login-hero p { color: var(--muted); font-size: 14px; margin-top: 6px; }
</style>
</head>
<body>
<div id="app"></div>
<script src="/shared.js"></script>
<script src="/guide.js"></script>
<script src="/portal/app.js"></script>
</body>
</html>
