<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>My Portal — DoCare</title>
<link rel="stylesheet" href="/theme.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23283618'/><path d='M72 32 A27 27 0 1 0 72 68' fill='none' stroke='%23C6A15B' stroke-width='7' stroke-linecap='round'/><rect x='66' y='23' width='15' height='11' rx='4' fill='%23C6A15B'/><circle cx='41' cy='60' r='13' fill='none' stroke='%23C6A15B' stroke-width='4.5'/><circle cx='41' cy='60' r='6' fill='%23C6A15B'/></svg>">
<style>
  body { background: var(--bg); }
  .p-app { max-width: 560px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
  .p-top {
    display: grid; grid-template-columns: 44px 1fr 44px; align-items: center;
    padding: 14px 16px 10px;
    background: var(--brand); color: #fff;
  }
  .p-top .t-logo {
    justify-self: center; height: 34px; width: auto;
    filter: drop-shadow(0 2px 5px rgba(0,0,0,.5)) drop-shadow(0 0 12px rgba(225,199,132,.28));
  }
  .p-top .icon-btn { color: #fff; }
  .p-top .icon-btn:hover { background: rgba(255,255,255,.12); }

  /* dark olive band behind the home greeting + hero card */
  .home-band { margin: -18px -16px 0; padding: 8px 20px 84px; background: var(--brand); border-radius: 0 0 26px 26px; }
  .home-band.no-plan { padding-bottom: 26px; }
  .hello-dark { display: flex; align-items: center; gap: 13px; color: #fff; margin: 8px 0 20px; }
  .avatar-circ {
    width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,.14); display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head); font-weight: 800; font-size: 16px; letter-spacing: .02em;
  }
  .hello-dark h1 { font-size: 21px; color: #fff; }
  .hello-dark .sub { font-size: 13px; color: rgba(255,255,255,.68); margin-top: 1px; }

  /* hero card — medication status on the dark band */
  .hero-card { position: relative; background: var(--surface); border-radius: 20px; padding: 18px 18px 16px; box-shadow: var(--shadow-md); }
  .hero-lbl { font-size: 11.5px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--brand); padding-right: 116px; }
  .hero-title { font-family: var(--font-head); font-size: 25px; font-weight: 800; margin: 6px 0; color: var(--text); }
  .hero-desc { font-size: 13.5px; color: var(--muted); line-height: 1.5; max-width: 62%; }
  .hero-photo { position: absolute; top: 12px; right: 8px; width: 118px; height: 122px; object-fit: contain; pointer-events: none; }
  /* interactive phase journey — colored dots on a filling track */
  .phase-journey { position: relative; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding: 6px 0; }
  .pj-track {
    position: absolute; left: 17px; right: 17px; top: 50%; height: 4px;
    transform: translateY(-50%); background: var(--bg); border-radius: 2px; overflow: hidden;
  }
  .pj-track > span { display: block; height: 100%; border-radius: 2px; background: linear-gradient(90deg, #283618, #1F7A68); transition: width .6s var(--ease); }
  .phase-day {
    position: relative; z-index: 1; width: 34px; height: 34px; border-radius: 50%; border: none; padding: 0;
    font-family: var(--font-head); font-weight: 800; font-size: 12.5px;
    color: var(--pc); background: var(--surface);
    box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--pc) 45%, #fff);
    cursor: pointer;
    transition: transform .16s var(--ease), box-shadow .16s var(--ease), background .16s var(--ease), color .16s var(--ease);
  }
  .phase-day::after { content: ""; position: absolute; inset: -6px; border-radius: 50%; }
  .phase-day.done { background: var(--pc); color: #fff; box-shadow: none; }
  .phase-day.now {
    background: var(--pc); color: #fff; transform: scale(1.16);
    box-shadow: 0 0 0 3px var(--surface), 0 0 0 5px var(--pc);
    animation: pjPulse 2.4s var(--ease) infinite;
  }
  .phase-day.sel { transform: scale(1.12); box-shadow: 0 0 0 3px var(--surface), 0 0 0 5px var(--refined-gold, #C6A15B); }
  .phase-day:active { transform: scale(.9); }
  .phase-day.mini { width: 22px; height: 22px; }
  @keyframes pjPulse {
    0%, 100% { box-shadow: 0 0 0 3px var(--surface), 0 0 0 5px var(--pc); }
    50% { box-shadow: 0 0 0 3px var(--surface), 0 0 0 9px color-mix(in srgb, var(--pc) 40%, transparent); }
  }
  /* medication photos gently float in place */
  .hero-photo, .dose-photo { animation: medFloat 3.8s ease-in-out infinite; }
  @keyframes medFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .hero-photo, .dose-photo, .phase-day.now, .pj-track > span { animation: none; transition: none; }
  }
  .hero-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 13px; color: var(--muted); font-weight: 600; }
  .hero-next { margin-top: 6px; font-size: 12.5px; color: var(--muted); }
  .qa-grid.qa-overlap { margin-top: -64px; position: relative; z-index: 1; }

  /* "Your dose & how to take it" card */
  .dose-card { position: relative; }
  .dose-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .dose-head b { font-family: var(--font-head); font-size: 15.5px; }
  .dose-head .qa-ico { width: 38px; height: 38px; }
  .dose-chips { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .chip-solid, .chip-soft { border-radius: var(--r-full); padding: 5px 14px; font-weight: 700; font-size: 13px; font-family: var(--font-head); }
  .chip-solid { background: var(--brand); color: #fff; }
  .chip-soft { background: var(--brand-soft); color: var(--brand); }
  .dose-text { font-size: 13.5px; color: var(--muted); line-height: 1.5; max-width: 62%; margin-bottom: 10px; }
  .dose-photo { position: absolute; top: 14px; right: 10px; width: 100px; height: 124px; object-fit: contain; pointer-events: none; }
  .linklike-p { background: none; border: none; color: var(--brand); font-weight: 700; font-family: var(--font-head); font-size: 13.5px; display: inline-flex; align-items: center; gap: 5px; padding: 0; }

  .p-view { flex: 1; padding: 18px 16px calc(86px + env(safe-area-inset-bottom)); }

  .p-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: min(560px, 100%); z-index: 100;
    display: flex; background: var(--surface);
    border-top: 1px solid var(--border); box-shadow: 0 -4px 20px rgba(20,49,47,.07);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .p-nav button {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 10px 4px 9px; background: none; border: none; color: var(--faint);
    font-size: 10.5px; font-weight: 700; font-family: var(--font-head); letter-spacing: .02em;
    min-height: 56px;
  }
  .p-nav button.on { color: var(--brand); }
  .p-nav .nav-log {
    margin-top: -22px;
  }
  .p-nav .nav-log .log-fab {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--brand); color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 16px rgba(30,76,78,.4);
    transition: transform .15s var(--ease);
  }
  .p-nav .nav-log:active .log-fab { transform: scale(.93); }

  /* per-medication row on the home screen's "Your medications" list */
  .med-row { border-top: 1px solid var(--border); }
  .med-row:first-child { border-top: none; }
  .med-row-sum { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; list-style: none; }
  .med-row-sum::-webkit-details-marker { display: none; }
  .med-row-sum svg:last-child { color: var(--muted); transition: transform .2s var(--ease); flex-shrink: 0; }
  .med-row[open] .med-row-sum svg:last-child { transform: rotate(90deg); }
  .med-row-sum:hover { background: var(--brand-soft); }
  .med-row-illus { flex-shrink: 0; line-height: 0; }
  .med-row-sum .pt-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .med-row-body { padding: 0 16px 16px 68px; }
  .med-row-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .qa {
    display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 16px; text-align: left; box-shadow: var(--shadow-sm);
    transition: transform .13s var(--ease), box-shadow .15s var(--ease);
  }
  .qa:active { transform: scale(.97); }
  .qa-ico { width: 46px; height: 46px; border-radius: 50%; background: var(--brand-soft); color: var(--brand); display: flex; align-items: center; justify-content: center; box-shadow: var(--inset-top-highlight), 0 1px 3px rgba(23,32,15,.08); }
  .qa b { font-family: var(--font-head); font-size: 15px; }
  .qa span { font-size: 12.5px; color: var(--muted); }

  .list-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); margin-bottom: 16px; }
  .list-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px 0; }
  .list-head h3 { font-size: 15px; display: flex; gap: 8px; align-items: center; }
  .list-head h3 svg { color: var(--brand); }

  .site-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .msg-list { display: flex; flex-direction: column; gap: 10px; padding: 4px 2px; }
  .msg { max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: 14.5px; }
  .msg.patient { align-self: flex-end; background: var(--brand); color: #fff; border-bottom-right-radius: 4px; }
  .msg.doctor { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-time { font-size: 10.5px; opacity: .65; margin-top: 3px; }
  .msg-bar { position: fixed; bottom: calc(64px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: min(560px, 100%); padding: 10px 14px; background: var(--bg); display: flex; gap: 8px; }

  .sym-block { margin-bottom: 14px; }
  .sym-lbl { font-size: 12.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 7px; }
  .sym-opts { display: flex; gap: 7px; flex-wrap: wrap; }

  .login-hero { text-align: center; padding: 46px 20px 26px; }
  .login-hero .brand-mark { width: 62px; height: 62px; border-radius: 18px; background: var(--brand); color: #fff; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .login-hero h1 { font-size: 23px; }
  .login-hero p { color: var(--muted); font-size: 14px; margin-top: 6px; }
</style>
</head>
<body>
<div id="app"></div>
<script src="/shared.js?v=docare6"></script>
<script src="/patient-guides.js?v=docare6"></script>
<script src="/guide.js?v=docare6"></script>
<script src="/portal/app.js?v=docare6"></script>
</body>
</html>
