<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor Dashboard — DarDoc · PeptiDoc</title>
<link rel="stylesheet" href="/theme.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2355682B'/><path d='M50 78c-16 0-28-12-28-28 0-10 5-18 13-23 3 8 8 13 16 16 8 3 15 8 18 16a26 26 0 0 1-19 19Z' fill='none' stroke='%23E9C766' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/><path d='M30 70c3-8 9-13 16-16' fill='none' stroke='%23E9C766' stroke-width='6' stroke-linecap='round'/></svg>">
<style>
  /* ── app shell ─────────────────────────────────────────── */
  .shell { display: grid; grid-template-columns: 248px 1fr; min-height: 100dvh; }
  .sidebar {
    background: var(--brand); color: #E7E8D3;
    display: flex; flex-direction: column; padding: 20px 14px;
    position: sticky; top: 0; height: 100dvh;
  }
  .sb-brand { display: flex; align-items: center; gap: 11px; padding: 4px 10px 20px; color: #fff; }
  .sb-mark { width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,.14); display: flex; align-items: center; justify-content: center; }
  .sb-name { font-family: var(--font-head); font-weight: 800; font-size: 15.5px; line-height: 1.15; }
  .sb-sub { font-size: 11px; opacity: .7; }
  .sb-nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .sb-link {
    display: flex; align-items: center; gap: 12px; padding: 11px 12px;
    border-radius: var(--r-md); color: #D6DABF; text-decoration: none;
    font-family: var(--font-head); font-weight: 600; font-size: 14.5px;
    transition: background .15s var(--ease), color .15s var(--ease);
  }
  .sb-link:hover { background: rgba(255,255,255,.08); color: #fff; }
  .sb-link.on { background: rgba(255,255,255,.14); color: #fff; }
  .sb-link .badge { margin-left: auto; }
  .sb-user { display: flex; align-items: center; gap: 10px; padding: 12px 10px 4px; border-top: 1px solid rgba(255,255,255,.12); color: #fff; }
  .sb-user .avatar { background: rgba(255,255,255,.15); color: #fff; width: 36px; height: 36px; font-size: 13px; }
  .sb-user-name { font-size: 13.5px; font-weight: 600; line-height: 1.2; }
  .sb-user-role { font-size: 11px; opacity: .65; }
  .sb-user .icon-btn { margin-left: auto; color: #D6DABF; }
  .sb-user .icon-btn:hover { background: rgba(255,255,255,.1); color: #fff; }

  .main { padding: clamp(16px, 3vw, 32px); max-width: 1200px; width: 100%; margin: 0 auto; }
  .page-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  .page-head h1 { font-size: clamp(21px, 3vw, 26px); font-weight: 800; }
  .page-head .sub { color: var(--muted); font-size: 14px; margin-top: 2px; }

  /* mobile top bar + drawer nav */
  .mobile-bar, .m-nav { display: none; }
  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .mobile-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      position: sticky; top: 0; z-index: 50;
      background: var(--brand); color: #fff; padding: 12px 16px;
    }
    .mobile-bar .brand-line { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-weight: 800; font-size: 15.5px; }
    .m-nav {
      display: flex; position: sticky; top: 58px; z-index: 49;
      background: var(--surface); border-bottom: 1px solid var(--border);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .m-nav a {
      flex-shrink: 0; padding: 12px 15px; text-decoration: none; color: var(--muted);
      font-family: var(--font-head); font-weight: 600; font-size: 13.5px;
      border-bottom: 2.5px solid transparent;
    }
    .m-nav a.on { color: var(--brand); border-bottom-color: var(--brand); }
  }

  /* dashboard pieces */
  .two-col { display: grid; grid-template-columns: 1.6fr 1fr; gap: 18px; align-items: start; }
  @media (max-width: 1000px) { .two-col { grid-template-columns: 1fr; } }
  .alert-item { display: flex; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--border); }
  .alert-item:last-child { border-bottom: none; }
  .alert-ico { width: 36px; height: 36px; border-radius: 10px; background: var(--danger-soft); color: var(--danger); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .alert-body { flex: 1; min-width: 0; }
  .alert-name { font-weight: 700; font-size: 14.5px; font-family: var(--font-head); }
  .alert-sym { font-size: 13px; color: var(--muted); }
  .alert-meta { font-size: 12px; color: var(--faint); margin-top: 2px; }

  .pt-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); transition: background .12s; cursor: pointer; }
  .pt-row:hover { background: #FCFBF6; }
  .pt-row:last-child { border-bottom: none; }
  .pt-info { flex: 1; min-width: 0; }
  .pt-name { font-family: var(--font-head); font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .pt-meta { font-size: 12.5px; color: var(--muted); margin-top: 1px; }
  .pt-side { text-align: right; font-size: 12.5px; color: var(--faint); flex-shrink: 0; }

  /* wizard */
  .steps { display: flex; gap: 6px; margin-bottom: 24px; }
  .step-dot { flex: 1; display: flex; flex-direction: column; gap: 7px; align-items: stretch; }
  .step-bar { height: 5px; border-radius: 3px; background: var(--border); }
  .step-dot.done .step-bar, .step-dot.on .step-bar { background: var(--brand); }
  .step-lbl { font-size: 11.5px; font-weight: 700; color: var(--faint); letter-spacing: .03em; }
  .step-dot.on .step-lbl { color: var(--brand); }
  .tpl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .tpl-card {
    padding: 16px; border: 1.5px solid var(--border); border-radius: var(--r-md);
    background: var(--surface); cursor: pointer; text-align: left;
    transition: border-color .15s, box-shadow .15s;
  }
  .tpl-card:hover { border-color: var(--brand); box-shadow: var(--shadow-md); }
  .tpl-card.sel { border-color: var(--brand); background: var(--brand-soft); }
  .tpl-name { font-family: var(--font-head); font-weight: 700; font-size: 15px; margin: 8px 0 3px; }
  .tpl-sub { font-size: 12.5px; color: var(--muted); }
  .phase-row { display: grid; grid-template-columns: 1.2fr .8fr .6fr 1.4fr 40px; gap: 8px; margin-bottom: 8px; align-items: center; }
  @media (max-width: 700px) { .phase-row { grid-template-columns: 1fr 1fr; } .phase-row .icon-btn { grid-column: 2; justify-self: end; } }

  .metric-strip { display: flex; gap: 10px; flex-wrap: wrap; margin: 6px 0 12px; }
  .metric { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-md); padding: 8px 14px; font-size: 13px; }
  .metric b { font-family: var(--font-head); font-size: 15px; display: block; }

  /* patient detail */
  .detail-head { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .detail-head .avatar { width: 56px; height: 56px; font-size: 20px; }
  .tabs { display: flex; gap: 4px; border-bottom: 1.5px solid var(--border); margin-bottom: 18px; overflow-x: auto; }
  .tab {
    padding: 11px 16px; border: none; background: none; color: var(--muted);
    font-family: var(--font-head); font-weight: 600; font-size: 14px;
    border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; white-space: nowrap;
  }
  .tab.on { color: var(--brand); border-bottom-color: var(--brand); }
  .msg-list { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; padding: 4px; }
  .msg { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 14.5px; }
  .msg.doctor { align-self: flex-end; background: var(--brand); color: #fff; border-bottom-right-radius: 4px; }
  .msg.patient { align-self: flex-start; background: var(--bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-time { font-size: 10.5px; opacity: .65; margin-top: 3px; }
  .timeline-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .timeline-item:last-child { border-bottom: none; }
  .tl-ico { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .intake-sec-title { display: flex; align-items: center; gap: 8px; font-family: var(--font-head); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--brand); margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .intake-sec-title:first-child { margin-top: 0; }
  .intake-sec-title svg { color: var(--brand); }
  .intake-sec-title.first { margin-top: 0; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .qf-box { background: var(--brand-soft); border: 1px solid var(--border-strong); border-radius: var(--r-md); padding: 14px 16px; margin: 4px 0 6px; }
  .qf-box label { display: flex; align-items: center; gap: 8px; font-family: var(--font-head); font-weight: 700; font-size: 13px; color: var(--brand); margin-bottom: 8px; }
  .qf-box label svg { color: var(--brand); }
  .qf-box .hint { display: block; margin-top: 6px; }

  /* intake sub-wizard progress (mirrors Consult-Buddy's Step X of Y bar) */
  .intake-progress { margin-bottom: 18px; }
  .intake-progress-top { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
  .intake-progress-bar { height: 7px; border-radius: 4px; background: var(--border); overflow: hidden; }
  .intake-progress-bar > div { height: 100%; background: var(--brand); border-radius: 4px; transition: width .25s var(--ease); }

  /* clinical-analysis styled boxes (ported look from Consult-Buddy) */
  .bmi-badge { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-radius: var(--r-md); font-weight: 700; font-size: 14px; margin-bottom: 14px; }
  .bmi-badge .cat { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .metabolic-box { background: var(--amber-soft); border: 1px solid #EAD5A8; border-radius: var(--r-md); padding: 16px; margin-bottom: 16px; }
  .metabolic-box h3 { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--amber); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; }
  .metabolic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .metabolic-grid .m-lbl { font-size: 12px; color: var(--muted); margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
  .metabolic-grid .m-val { font-family: var(--font-head); font-weight: 800; font-size: 18px; }
  .metabolic-target { margin-top: 12px; padding-top: 12px; border-top: 1px solid #EAD5A8; }
  .metabolic-target .m-lbl { color: var(--amber); font-weight: 700; }
  .metabolic-target .m-val { font-size: 22px; color: var(--amber); }
  .preg-box { background: #FDF0F5; border: 1px solid #F6D9E6; border-radius: var(--r-md); padding: 14px 16px; margin-bottom: 16px; }
  .preg-box h3 { font-size: 12px; font-weight: 700; color: #C2447B; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; }
  .clinical-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px 16px; margin-bottom: 14px; }
  .clinical-box.allergy h3, .clinical-box.chronic h3 { font-size: 12px; font-weight: 700; color: var(--amber); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .match-box { background: var(--brand-soft); border: 1px solid var(--brand); border-radius: var(--r-md); padding: 14px 16px; }

  /* suggested-peptides side panel (Intake → Primary Health Objectives) */
  .suggested-peptides { position: sticky; top: 20px; }
  .suggested-peptides .card-title { display: flex; align-items: center; gap: 8px; color: var(--brand); }
  .sp-list { display: flex; flex-direction: column; gap: 8px; }
  .sp-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-md); padding: 9px 12px; }
  .sp-name { display: flex; align-items: center; gap: 8px; min-width: 0; font-size: 13.5px; font-weight: 600; }
  .sp-name span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sp-info { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border-strong); background: var(--surface); color: var(--muted); flex-shrink: 0; transition: all .15s var(--ease); }
  .sp-info:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-soft); }

  /* peptide detail modal */
  .modal-wide { width: min(680px, 100%); }
  .pep-talking { background: linear-gradient(135deg, var(--brand-soft), var(--primary-soft)); border: 1px solid var(--border-strong); border-radius: var(--r-lg); padding: 16px; margin-bottom: 16px; }
  .pep-sec-head { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; color: var(--brand); margin-bottom: 4px; }
  .pep-tp { display: flex; gap: 10px; align-items: flex-start; margin-top: 10px; font-size: 13px; }
  .pep-tp:first-of-type { margin-top: 0; }
  .pep-tp .badge { flex-shrink: 0; margin-top: 1px; }
  .pep-tp span:last-child { color: var(--muted); line-height: 1.5; }
  .pep-sec { border-radius: var(--r-md); padding: 14px 16px; margin-bottom: 12px; border: 1px solid var(--border); background: var(--bg); }
  .pep-sec p { font-size: 13.5px; line-height: 1.55; color: var(--text); margin-top: 6px; padding-left: 22px; }
  .pep-sec.teal { border-color: #D6D8B0; background: var(--brand-soft); }
  .pep-sec.amber { border-color: #EAD5A8; background: var(--amber-soft); }
  .pep-sec.green { border-color: #D9E2BC; background: var(--accent-soft); }
  .pep-sec.rose, .pep-warn { border-color: #EFC9C0; background: var(--danger-soft); }
  .pep-sec.violet { border-color: #DACBF5; background: var(--violet-soft); }
  .pep-sec.sky { border-color: #EAD9A6; background: var(--primary-soft); }
  .pep-warn { border-radius: var(--r-md); padding: 14px 16px; margin-bottom: 12px; }
  .pep-warn .pep-sec-head { color: var(--danger); }
  .pep-warn p { font-size: 13.5px; color: #7C1D1D; padding-left: 22px; margin-top: 6px; }
  .pep-rx-title { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); text-align: center; margin: 16px 0 10px; position: relative; }
  .pep-rx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .pep-info-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-md); padding: 10px 14px; }
  .pep-info-card .lbl { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); }
  .pep-info-card .val { font-size: 13.5px; font-weight: 600; margin-top: 2px; }

  .pin-display {
    font-family: var(--font-head); font-size: 34px; font-weight: 800; letter-spacing: .35em;
    text-align: center; background: var(--brand-soft); color: var(--brand);
    border-radius: var(--r-md); padding: 16px 10px 16px 22px; margin: 10px 0 16px;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="/shared.js"></script>
<script src="/guide.js"></script>
<script src="/doctor/app.js"></script>
</body>
</html>
