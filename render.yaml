services:
  - type: web
    name: dardoc-peptidoc
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: IMPORT_SUPABASE
        value: "1"
      - key: ADMIN_EMAIL
        value: drsamimoha2018@gmail.com
      # Prompted once at blueprint creation — sets the doctor login for the
      # public deploy instead of shipping the default password. Min 8 chars.
      - key: ADMIN_PASSWORD
        sync: false
