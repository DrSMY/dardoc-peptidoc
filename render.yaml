services:
  - type: web
    name: dardoc-peptidoc
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: IMPORT_SUPABASE
        value: "1"
